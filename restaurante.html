<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reservas</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contenedor {
            background: white;
            width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,.2);
        }

        h1 {
            text-align: center;
            color: #d35400;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #d35400;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover {
            background: #a04000;
        }

        #resultado {
            margin-top: 25px;
            background: #f9f9f9;
            border-left: 5px solid #d35400;
            padding: 15px;
            min-height: 150px;
            white-space: pre-line;
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <div class="contenedor">

        <h1>🍽 Sistema de Reservas</h1>

        <label>Nombre del cliente</label>
        <input type="text" id="nombre" placeholder="Ejemplo: Juan">

        <label>Mesas solicitadas</label>
        <input type="number" id="mesas" placeholder="Ejemplo: 2">

        <button onclick="iniciarReserva()">
            Realizar Reserva
        </button>

        <div id="resultado">
            Esperando una reserva...
        </div>

    </div>

    <script src="JS/script4.js"></script>

</body>

</html>
