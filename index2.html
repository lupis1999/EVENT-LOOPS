<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Biblioteca</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:20px;
        }

        h1{
            color:#2c3e50;
        }

        button{
            padding:10px 15px;
            margin:5px;
            cursor:pointer;
        }

        #inventario{
            margin-top:20px;
        }

        .libro{
            background:white;
            padding:10px;
            margin:10px 0;
            border-radius:8px;
            box-shadow:0 2px 5px rgba(0,0,0,.2);
        }

        .disponible{
            color:green;
            font-weight:bold;
        }

        .prestado{
            color:red;
            font-weight:bold;
        }
    </style>
</head>
<body>

<h1>📚 Gestión de Biblioteca</h1>

<button onclick="consultarInventario()">
    Consultar Inventario
</button>

<button onclick="agregarLibro()">
    Agregar Libro
</button>

<button onclick="cambiarDisponibilidad()">
    Cambiar Disponibilidad
</button>

<div id="inventario"></div>

<script src="JS/script2.js"></script>

</body>
</html>
