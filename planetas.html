<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Explorador Espacial</title>


<style>

body{

font-family:Arial;
background:#111827;
color:white;
text-align:center;

}


.container{

width:500px;
margin:auto;

}


input,textarea{

width:90%;
padding:10px;
margin:10px;

}


button{

padding:10px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;

}


.card{

background:#1f2937;
padding:15px;
margin:15px;
border-radius:10px;

}

</style>


</head>


<body>


<div class="container">


<h1>🚀 Explorador Espacial</h1>


<h2>Registrar planeta</h2>


<input id="nombre" placeholder="Nombre del planeta">


<textarea id="descripcion"
placeholder="Descripción"></textarea>


<input id="descubierto"
placeholder="Año de descubrimiento">


<button onclick="guardar()">
Guardar planeta
</button>


<h2>Planetas registrados</h2>


<div id="lista"></div>


</div>



<script>


async function cargar(){


const respuesta =
await fetch("/planetas");


const planetas =
await respuesta.json();


let html="";


planetas.forEach(p=>{


html+=`

<div class="card">

<h3>🌎 ${p.nombre}</h3>

<p>${p.descripcion}</p>

<p>Descubierto: ${p.descubierto}</p>

<button onclick="eliminar(${p.id})">
Eliminar
</button>

</div>

`;


});


document.getElementById("lista").innerHTML=html;


}



async function guardar(){


const planeta={

nombre:
document.getElementById("nombre").value,


descripcion:
document.getElementById("descripcion").value,


descubierto:
document.getElementById("descubierto").value

};



await fetch("/planetas",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(planeta)


});


alert("🚀 Planeta agregado");


cargar();


}



async function eliminar(id){


await fetch("/planetas/"+id,{

method:"DELETE"

});


cargar();


}



cargar();


</script>


</body>

</html>
